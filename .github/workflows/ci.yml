name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  check:
    name: Type-check and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      # Lint is informational: some platform-specific module imports
      # (.native/.web suffixes) are false-positives for the import resolver
      # but resolve correctly under tsc and Metro.
      - name: Lint
        run: npm run lint
        continue-on-error: true
