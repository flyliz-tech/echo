<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Edit Task - Echo</title>

                        "primary-fixed": "#e2dfff",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#ffb95f",
                        "outline-variant": "#c7c4d8",
                        "tertiary-container": "#006d62",
                        "error": "#ba1a1a",
                        "on-surface": "#1a1a2e",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-secondary-fixed": "#2a1700",
                        "surface-bright": "#fcf8ff",
                        "on-tertiary-fixed": "#00201c",
                        "on-primary-fixed-variant": "#3323cc",
                        "surface-variant": "#e2e0fc",
                        "on-secondary-container": "#684000",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#4fdbc8",
                        "surface-container": "#efecff",
                        "inverse-primary": "#c3c0ff",
                        "inverse-on-surface": "#f2efff",
                        "on-background": "#1a1a2e",
                        "on-tertiary-container": "#69f1de",
                        "on-tertiary-fixed-variant": "#005048",
                        "surface-tint": "#4d44e3",
                        "surface-dim": "#dad7f3",
                        "on-primary-fixed": "#0f0069",

                        "secondary": "#855300",
                        "on-surface-variant": "#464555",
                        "primary-container": "#4f46e5",

                        "bg-level-0": "#F7F8FC",
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px",

                    spacing: {
                        xs: "8px",
                        sm: "12px",

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F7F8FC; /* Level 0 Background */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e0fc;
            border-radius: 4px;
        }
        
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4f46e5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4f46e5;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background bg-bg-level-0 h-[884px] flex flex-col overflow-hidden relative">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background w-full sticky top-0 z-40 px-container-padding h-14 flex items-center justify-between flat no shadows shadow-[0_2px_8px_rgba(26,26,46,0.02)] shrink-0">
<button aria-label="Go back" class="text-on-surface-variant dark:text-outline-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed text-center flex-1 pr-10">Edit Task</h1>
<!-- Invisible element to balance flex layout since trailing icon is missing but header should be centered -->
<div class="w-10"></div>
</header>
<!-- Main Scrollable Canvas -->
<main class="flex-1 overflow-y-auto overflow-x-hidden w-full pb-32">
<div class="max-w-md mx-auto w-full px-container-padding py-6 space-y-lg">
<!-- Task Title Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1" for="task-title">Task Name</label>
<div class="bg-surface-container-lowest rounded-xl shadow-level-1 overflow-hidden transition-all focus-within:ring-2 focus-within:ring-primary-container/30">
<input class="w-full bg-transparent border-0 px-md py-4 font-body-lg text-body-lg text-on-surface focus:ring-0 placeholder:text-outline-variant" id="task-title" placeholder="What needs to be done?" type="text" value="Buy Milk"/>
</div>
</div>
<!-- Priority Selector -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Priority</label>
<div class="grid grid-cols-3 gap-3">
<button class="bg-surface-container-lowest rounded-xl shadow-level-1 py-3 px-2 flex flex-col items-center justify-center gap-1 active:scale-95 transition-all border border-transparent hover:border-surface-variant">
<div class="w-3 h-3 rounded-full bg-tertiary-fixed-dim"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Low</span>
</button>
<button class="bg-primary-fixed/20 border-primary-container rounded-xl shadow-level-1 py-3 px-2 flex flex-col items-center justify-center gap-1 active:scale-95 transition-all border-2">
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
<span class="font-label-sm text-label-sm text-primary-fixed-variant font-bold">Medium</span>
</button>
<button class="bg-surface-container-lowest rounded-xl shadow-level-1 py-3 px-2 flex flex-col items-center justify-center gap-1 active:scale-95 transition-all border border-transparent hover:border-surface-variant">
<div class="w-3 h-3 rounded-full bg-error"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">High</span>
</button>
</div>
</div>
<!-- Time Reminder Section -->
<div class="bg-surface-container-lowest rounded-2xl shadow-level-1 p-md space-y-md">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-surface-container-high p-2 rounded-lg text-primary">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
<div>
<h3 class="font-headline-md text-[16px] text-on-surface">Time Reminder</h3>
<p class="font-body-md text-[13px] text-on-surface-variant">Notify at a specific time</p>
</div>
</div>
<!-- Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surface-container appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out checked:translate-x-6 checked:border-primary-container" id="time-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out checked:bg-primary-container" for="time-toggle"></label>
</div>
</div>
<!-- Date & Time Pickers (Visible because toggle is ON) -->
<div class="grid grid-cols-2 gap-3 pt-2 border-t border-surface-variant/50">
<button class="flex items-center gap-2 bg-surface-container-low px-3 py-3 rounded-xl active:bg-surface-variant transition-colors text-left">
<span class="material-symbols-outlined text-outline text-[18px]">calendar_month</span>
<div class="flex-1 overflow-hidden text-ellipsis whitespace-nowrap">
<span class="font-body-md text-on-surface">July 03, 2024</span>
</div>
</button>
<button class="flex items-center gap-2 bg-surface-container-low px-3 py-3 rounded-xl active:bg-surface-variant transition-colors text-left">
<span class="material-symbols-outlined text-outline text-[18px]">access_time</span>
<div class="flex-1 overflow-hidden text-ellipsis whitespace-nowrap">
<span class="font-body-md text-on-surface">06:30 PM</span>
</div>
</button>
</div>
</div>
<!-- Location Reminder Section -->
<div class="bg-surface-container-lowest rounded-2xl shadow-level-1 overflow-hidden">
<div class="p-md flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-surface-container-high p-2 rounded-lg text-primary">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div>
<h3 class="font-headline-md text-[16px] text-on-surface">Location Reminder</h3>
<p class="font-body-md text-[13px] text-on-surface-variant">Navami, Moodbidri</p>
</div>
</div>
<!-- Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surface-container appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out checked:translate-x-6 checked:border-primary-container" id="location-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out checked:bg-primary-container" for="location-toggle"></label>
</div>
</div>
<!-- Map Preview (Visible because toggle is ON) -->
<div class="relative w-full h-32 bg-surface-variant border-t border-surface-variant/50">
<img class="w-full h-full object-cover" data-alt="A clean, modern light-mode map interface showing a street grid with a subtle blue tint. A central location pin marks a spot, surrounded by a faint, glowing 150m radius indicator circle in a soft primary blue color (#3525cd). The map style is minimalist, rejecting harsh satellite imagery for a smooth vector aesthetic." data-location="Moodbidri" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBaaAFl48t_s9IA5Oi-c6ffm5Qz8uP7AkJYPhEMNOBXMOqDKh-Pmmcu4tBD6fga4SJ807q-k9EkHod7cupY8Smi-WP1iPvUgQs8HEx9WtKO-_alYIFPueP0QcHN3iW_UBkpr_UEGT_yQXNqrCfe6xFOUvgUVXCclg__91CDjlrV65dYh-sSPZuiLBBN-9fJMH59YeJwRD3xEBH962jfI4Hiw76FRjkYLTFSpwf8Yt-eLqIWG6EK8Z2wIlF4lbzrCrdsooTe1qeBGqM"/>
<!-- Overlay Badge -->
<div class="absolute bottom-2 left-2 bg-surface-container-lowest/90 backdrop-blur-sm px-2 py-1 rounded-lg shadow-sm flex items-center gap-1 border border-surface-variant/30">
<span class="material-symbols-outlined text-primary text-[14px]">radar</span>
<span class="font-label-sm text-[10px] text-on-surface">150m Radius</span>
</div>
</div>
</div>
<!-- Notes Section -->
<div class="space-y-xs pb-10">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1" for="task-notes">Notes</label>
<div class="bg-surface-container-lowest rounded-xl shadow-level-1 overflow-hidden transition-all focus-within:ring-2 focus-within:ring-primary-container/30">
<textarea class="w-full bg-transparent border-0 px-md py-4 font-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant resize-none" id="task-notes" placeholder="Add extra details..." rows="4">Pick up 2 liters of full cream milk. Check for expiry date.</textarea>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-lowest/90 backdrop-blur-md shadow-[0_-4px_16px_rgba(26,26,46,0.05)] border-t border-surface-variant/20 px-container-padding py-4 pb-8 safe-area-bottom flex items-center justify-between gap-4">
<button class="font-body-md font-semibold text-outline py-3 px-6 hover:text-on-surface transition-colors active:scale-95 duration-150">
            Cancel
        </button>
<button class="flex-1 bg-gradient-to-r from-primary to-primary-container text-on-primary py-3 px-6 rounded-xl shadow-level-3-glow font-body-md font-semibold flex items-center justify-center gap-2 active:scale-95 transition-all duration-150 hover:opacity-90">
<span class="material-symbols-outlined text-[18px]">save</span>
            Save Changes
        </button>
</div>
<script>
        // Simple toggle interaction logic for demonstration
        document.getElementById('time-toggle').addEventListener('change', function(e) {
            const container = this.closest('.bg-surface-container-lowest').querySelector('.grid');
            if(e.target.checked) {
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
                container.style.height = 'auto';
            } else {
                container.style.opacity = '0.5';
                container.style.pointerEvents = 'none';
            }
        });

        document.getElementById('location-toggle').addEventListener('change', function(e) {
            const mapContainer = this.closest('.bg-surface-container-lowest').querySelector('.relative.w-full.h-32');
            if(e.target.checked) {
                mapContainer.style.display = 'block';
            } else {
                mapContainer.style.display = 'none';
            }
        });
    </script>
</body></html>
