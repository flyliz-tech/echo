<body class="min-h-screen text-on-surface pb-[100px] font-body-md text-body-md antialiased">
<!-- Top Area: Search Bar -->
<div class="px-container-padding pt-md pb-md sticky top-0 z-40" style="background-color: #F7F8FC;">
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full bg-surface-container-lowest rounded-full py-sm pl-10 pr-10 border-none outline-none card-shadow font-body-lg text-body-lg text-on-surface placeholder-outline focus:ring-2 focus:ring-primary-container transition-shadow" placeholder="Search by task, location, notes" type="text" value="b"/>
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="mt-xs pl-sm">
<span class="font-label-sm text-label-sm text-outline">2 results</span>
</div>
</div>
<!-- Main Content: Task List -->
<main class="px-container-padding flex flex-col gap-stack-gap">
<!-- Task Card 1 -->
<div class="bg-surface-container-lowest rounded-xl p-md card-shadow flex items-start gap-sm">
<div class="pt-xs flex-shrink-0">
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center cursor-pointer hover:border-primary-container transition-colors"></div>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-headline-md text-on-surface truncate">Buy Milk</h3>
<div class="mt-xs flex flex-wrap gap-xs">
<!-- Amber Time Tag -->
<div class="bg-secondary-fixed/30 rounded-full px-xs py-1 flex items-center gap-[4px]">
<span class="material-symbols-outlined text-[12px] text-secondary">schedule</span>
<span class="font-label-sm text-label-sm text-secondary">6:30 PM</span>
</div>
<!-- Teal Location Tag -->
<div class="bg-tertiary-fixed/30 rounded-full px-xs py-1 flex items-center gap-[4px]">
<span class="material-symbols-outlined text-[12px] text-tertiary-container">location_on</span>
<span class="font-label-sm text-label-sm text-tertiary-container">Navami, Moodbidri</span>
</div>
</div>
</div>
</div>
<!-- Task Card 2 -->
<div class="bg-surface-container-lowest rounded-xl p-md card-shadow flex items-start gap-sm">
<div class="pt-xs flex-shrink-0">
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center cursor-pointer hover:border-primary-container transition-colors"></div>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-headline-md text-on-surface truncate">Collect Laundry Clothes</h3>
<div class="mt-xs flex flex-wrap gap-xs">
<!-- Teal Location Tag -->
<div class="bg-tertiary-fixed/30 rounded-full px-xs py-1 flex items-center gap-[4px]">
<span class="material-symbols-outlined text-[12px] text-tertiary-container">location_on</span>
<span class="font-label-sm text-label-sm text-tertiary-container">Evershine Laundry</span>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Nav Bar -->
<nav class="bg-surface-container-lowest shadow-[0_-2px_8px_rgba(26,26,46,0.05)] fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-8 z-50 rounded-t-xl">
